model_name_or_path: /root/autodl-tmp/models/Qwen2.5-0.5B-Instruct
train_file: data/debug/sft_train.jsonl
eval_file: data/debug/sft_val.jsonl
output_dir: outputs/debug_sft_0.5b

max_seq_length: 1024
num_train_epochs: 1
learning_rate: 2.0e-4
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_ratio: 0.03
logging_steps: 2
save_steps: 20
save_total_limit: 1
bf16: true
gradient_checkpointing: true
report_to: tensorboard
seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
