model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/sft_train.jsonl
eval_file: data/processed/sft_val.jsonl
output_dir: outputs/sft_qwen_1.5b

# Use only the concise post-</think> solution as the CoT target. This keeps
# the trailing "Final Answer:" inside max_seq_length and avoids teaching the
# rambling R1 <think> style that triggered eval truncation.
strip_think: true
# Raised from 1024: ~38% of the old full-trace samples exceeded 1024 tokens,
# truncating the "Final Answer:" target. strip_think makes most samples much
# shorter, but 2048 leaves safe headroom.
max_seq_length: 2048
num_train_epochs: 2
learning_rate: 2.0e-4
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_ratio: 0.03
logging_steps: 10
save_steps: 100
save_total_limit: 2
bf16: true
gradient_checkpointing: true
report_to: tensorboard
seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
